name: Deploy main preview to server

on:
  push:
    branches: [main]
    paths:
      - "src/main/**"
      - "src/assets/**"
      - "src/index.js"
      - "src/index.css"
      - "src/reportWebVitals.js"
      - "public/**"
      - "scripts/**"
      - "package.json"
      - "yarn.lock"
      - ".github/workflows/deploy-main.yml"

concurrency:
  group: quottery-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy main preview over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT }}
          script: |
            mkdir -p /var/www/quottery_frontend
            if [ ! -d /var/www/quottery_frontend/main/.git ]; then
              git clone "$(git -C /var/www/quottery_frontend/app remote get-url origin)" /var/www/quottery_frontend/main
            fi
            cd /var/www/quottery_frontend/main
            git pull --ff-only origin main
            yarn install --frozen-lockfile
            npm run build:main
