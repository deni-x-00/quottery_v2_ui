name: Deploy app to server

on:
  push:
    branches: [main]
    paths:
      - "src/app/**"
      - "src/assets/**"
      - "src/index.js"
      - "src/index.css"
      - "src/reportWebVitals.js"
      - "src/setupTests.js"
      - "public/**"
      - "server/**"
      - "scripts/**"
      - "package.json"
      - "yarn.lock"
      - ".github/workflows/deploy.yml"

concurrency:
  group: quottery-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT }}
          script_stop: true
          script: |
            set -e
            export NVM_DIR="$HOME/.nvm"
            if [ -s "$NVM_DIR/nvm.sh" ]; then
              . "$NVM_DIR/nvm.sh"
              nvm use 24
            fi
            node -v
            yarn -v
            cd /var/www/quottery_frontend/app
            git pull origin main
            yarn install --frozen-lockfile
            set -a
            . /etc/quottery/quottery-db.env
            set +a
            yarn db:migrate
            npm run build
            sudo -n /usr/bin/systemctl restart quottery-bob-proxy.service
            sudo -n /usr/bin/systemctl restart quottery-indexer.service
